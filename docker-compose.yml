services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: civis-server
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    ports:
      - "5005:5005"
    restart: always
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: civis-client
    ports:
      - "10000:10000"
    depends_on:
      - server
    restart: always
