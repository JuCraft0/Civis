services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: civis-server
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5005
    ports:
      - "5005:5005"
    volumes:
      - /media/ZimaOS-HD/Media/Civis:/app/uploads
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: civis-client
    ports:
      - "10000:10000"
    depends_on:
      - server
    restart: always
