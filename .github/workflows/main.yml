name: Build & Push Docker Images

on:
  push:
    branches: [main]   # Läuft bei jedem Push auf main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # In GitHub Secrets hinterlegt
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Server
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: jucraft0/civis-server:latest

      - name: Build & Push Client
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          tags: jucraft0/civis-client:latest
